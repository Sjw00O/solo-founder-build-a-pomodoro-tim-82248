<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>番茄时钟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.3s;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 24px;
            text-align: center;
        }
        .mode {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .mode-btn {
            background: transparent;
            border: 2px solid #3a3a5c;
            color: #888;
            padding: 8px 24px;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .mode-btn.active {
            border-color: #e94560;
            color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }
        .timer-display {
            font-size: 96px;
            font-weight: 300;
            letter-spacing: 4px;
            margin: 24px 0;
            font-variant-numeric: tabular-nums;
            color: #fff;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 32px 0;
        }
        .ctrl-btn {
            background: #3a3a5c;
            border: none;
            color: #e0e0e0;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ctrl-btn:hover {
            background: #4a4a6c;
            transform: scale(1.05);
        }
        .ctrl-btn.primary {
            background: #e94560;
            color: #fff;
            width: 72px;
            height: 72px;
            font-size: 28px;
        }
        .ctrl-btn.primary:hover {
            background: #d63851;
        }
        .settings {
            background: #16213e;
            border-radius: 16px;
            padding: 20px;
            margin: 24px 0;
        }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }
        .setting-row label {
            font-size: 14px;
            color: #aaa;
        }
        .setting-row input {
            background: #0f3460;
            border: 1px solid #3a3a5c;
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            width: 70px;
            text-align: center;
            font-size: 14px;
        }
        .setting-row input:focus {
            outline: none;
            border-color: #e94560;
        }
        .sound-section {
            background: #16213e;
            border-radius: 16px;
            padding: 20px;
            margin: 24px 0;
        }
        .sound-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 12px;
        }
        .sound-btn {
            background: #0f3460;
            border: 2px solid transparent;
            color: #aaa;
            padding: 12px 8px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .sound-btn:hover {
            background: #1a4a7a;
        }
        .sound-btn.active {
            border-color: #e94560;
            color: #e94560;
            background: rgba(233, 69, 96, 0.15);
        }
        .volume-control {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
        }
        .volume-control input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #3a3a5c;
            border-radius: 2px;
            outline: none;
        }
        .volume-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #e94560;
            cursor: pointer;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 16px 0;
            font-size: 14px;
            color: #888;
        }
        .stats span {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .stats .num {
            font-size: 24px;
            color: #e0e0e0;
            font-weight: 300;
        }
        .upload-area {
            margin-top: 12px;
            padding: 12px;
            border: 2px dashed #3a3a5c;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            color: #888;
        }
        .upload-area:hover {
            border-color: #e94560;
            color: #e94560;
        }
        .upload-area input {
            display: none;
        }
        .custom-sounds {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .custom-sound-item {
            background: #0f3460;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .custom-sound-item button {
            background: none;
            border: none;
            color: #e94560;
            cursor: pointer;
            font-size: 14px;
        }
        .hidden {
            display: none;
        }
        @media (max-width: 480px) {
            .timer-display {
                font-size: 72px;
            }
            .container {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mode">
            <button class="mode-btn active" data-mode="work">工作</button>
            <button class="mode-btn" data-mode="break">休息</button>
        </div>

        <div class="timer-display" id="timerDisplay">25:00</div>

        <div class="controls">
            <button class="ctrl-btn" id="resetBtn" title="重置">↺</button>
            <button class="ctrl-btn primary" id="startBtn">▶</button>
            <button class="ctrl-btn" id="settingsToggle" title="设置">⚙</button>
        </div>

        <div class="stats">
            <span>今日完成 <span class="num" id="todayCount">0</span></span>
            <span>专注时长 <span class="num" id="todayMinutes">0</span>分钟</span>
        </div>

        <div id="settingsPanel" class="hidden">
            <div class="settings">
                <div class="setting-row">
                    <label>工作时长 (分钟)</label>
                    <input type="number" id="workDuration" value="25" min="1" max="120">
                </div>
                <div class="setting-row">
                    <label>休息时长 (分钟)</label>
                    <input type="number" id="breakDuration" value="5" min="1" max="60">
                </div>
            </div>

            <div class="sound-section">
                <h3 style="font-size:14px;color:#aaa;margin-bottom:8px;">环境音效</h3>
                <div class="sound-grid" id="soundGrid">
                    <button class="sound-btn" data-sound="rain">🌧 雨声</button>
                    <button class="sound-btn" data-sound="ocean">🌊 海浪</button>
                    <button class="sound-btn" data-sound="forest">🌲 森林</button>
                    <button class="sound-btn" data-sound="cafe">☕ 咖啡店</button>
                    <button class="sound-btn" data-sound="pink">🎵 粉红噪音</button>
                </div>
                <div class="volume-control">
                    <span style="font-size:12px;color:#888;">音量</span>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.5">
                    <span id="volumeLabel" style="font-size:12px;color:#888;min-width:32px;">50%</span>
                </div>
                <div class="upload-area" id="uploadArea">
                    <span>+ 上传自定义音效 (MP3/WAV)</span>
                    <input type="file" id="soundUpload" accept=".mp3,.wav">
                </div>
                <div class="custom-sounds" id="customSounds"></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============ Audio Engine ============
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            let audioCtx = null;
            let masterGain = null;
            let currentSource = null;
            let currentSound = null;
            let isAudioInitialized = false;

            // Built-in noise generators
            const noiseGenerators = {
                pink: createPinkNoise,
                rain: createRainNoise,
                ocean: createOceanNoise,
                forest: createForestNoise,
                cafe: createCafeNoise
            };

            function getAudioContext() {
                if (!audioCtx) {
                    audioCtx = new AudioCtx();
                    masterGain = audioCtx.createGain();
                    masterGain.gain.value = parseFloat(document.getElementById('volumeSlider').value) || 0.5;
                    masterGain.connect(audioCtx.destination);
                }
                return audioCtx;
            }

            function createPinkNoise(ctx) {
                const bufferSize = ctx.sampleRate * 2;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
                for (let i = 0; i < bufferSize; i++) {
                    const white = Math.random() * 2 - 1;
                    b0 = 0.99886 * b0 + white * 0.0555179;
                    b1 = 0.99332 * b1 + white * 0.0750759;
                    b2 = 0.96900 * b2 + white * 0.1538520;
                    b3 = 0.86650 * b3 + white * 0.3104856;
                    b4 = 0.55000 * b4 + white * 0.5329522;
                    b5 = -0.7616 * b5 - white * 0.0168980;
                    data[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.11;
                    b6 = white * 0.115926;
                }
                return buffer;
            }

            function createRainNoise(ctx) {
                const bufferSize = ctx.sampleRate * 2;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    const t = i / ctx.sampleRate;
                    const env = 0.5 + 0.5 * Math.sin(t * 3.7);
                    const noise = (Math.random() * 2 - 1) * env;
                    data[i] = noise * 0.4 + (Math.random() * 2 - 1) * 0.05;
                }
                return buffer;
            }

            function createOceanNoise(ctx) {
                const bufferSize = ctx.sampleRate * 4;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                let phase = 0;
                for (let i = 0; i < bufferSize; i++) {
                    const t = i / ctx.sampleRate;
                    const swell = 0.5 + 0.5 * Math.sin(t * 0.15 + Math.sin(t * 0.07) * 2);
                    const noise = (Math.random() * 2 - 1) * swell;
                    data[i] = noise * 0.3 + Math.sin(t * 0.8 + Math.sin(t * 0.2) * 0.5) * 0.05;
                }
                return buffer;
            }

            function createForestNoise(ctx) {
                const bufferSize = ctx.sampleRate * 3;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    const t = i / ctx.sampleRate;
                    const chirp = Math.sin(t * 120 + Math.sin(t * 3) * 5) * 0.1 * (0.5 + 0.5 * Math.sin(t * 0.5));
                    const wind = (Math.random() * 2 - 1) * 0.15 * (0.5 + 0.5 * Math.sin(t * 0.2));
                    data[i] = chirp + wind;
                }
                return buffer;
            }

            function createCafeNoise(ctx) {
                const bufferSize = ctx.sampleRate * 3;
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    const t = i / ctx.sampleRate;
                    const clatter = (Math.random() > 0.998) ? (Math.random() * 0.3) : 0;
                    const hum = Math.sin(t * 55 + Math.sin(t * 0.3) * 2) * 0.04;
                    const noise = (Math.random() * 2 - 1) * 0.1;
                    const chatter = Math.sin(t * 180 + Math.sin(t * 0.7) * 4) * 0.03;
                    data[i] = clatter + hum + noise + chatter;
                }
                return buffer;
            }

            function playNoise(type) {
                stopCurrentSound();
                const ctx = getAudioContext();
                const buffer = noiseGenerators[type] ? noiseGenerators[type](ctx) : null;
                if (!buffer) return;

                const source = ctx.createBufferSource();
                source.buffer = buffer;
                source.loop = true;
                source.connect(masterGain);
                source.start(0);
                currentSource = source;
                currentSound = type;
            }

            function playCustomSound(arrayBuffer) {
                stopCurrentSound();
                const ctx = getAudioContext();
                ctx.decodeAudioData(arrayBuffer, (buffer) => {
                    const source = ctx.createBufferSource();
                    source.buffer = buffer;
                    source.loop = true;
                    source.connect(masterGain);
                    source.start(0);
                    currentSource = source;
                    currentSound = 'custom';
                }, (err) => {
                    console.error('Audio decode error:', err);
                });
            }

            function stopCurrentSound() {
                if (currentSource) {
                    try { currentSource.stop(); } catch(e) {}
                    currentSource = null;
                }
                currentSound = null;
            }

            function setVolume(val) {
                if (masterGain) {
                    masterGain.gain.value = val;
                }
            }

            // ============ Timer ============
            let timerState = {
                mode: 'work',
                workDuration: 25,
                breakDuration: 5,
                timeLeft: 25 * 60,
                isRunning: false,
                interval: null,
                completedToday: 0,
                totalMinutesToday: 0
            };

            const timerDisplay = document.getElementById('timerDisplay');
            const startBtn = document.getElementById('startBtn');
            const resetBtn = document.getElementById('resetBtn');
            const workDurationInput = document.getElementById('workDuration');
            const breakDurationInput = document.getElementById('breakDuration');
            const todayCount = document.getElementById('todayCount');
            const todayMinutes = document.getElementById('todayMinutes');
            const settingsToggle = document.getElementById('settingsToggle');
            const settingsPanel = document.getElementById('settingsPanel');
            const volumeSlider = document.getElementById('volumeSlider');
            const volumeLabel = document.getElementById('volumeLabel');

            function formatTime(seconds) {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }

            function updateDisplay() {
                timerDisplay.textContent = formatTime(timerState.timeLeft);
            }

            function updateStats() {
                todayCount.textContent = timerState.completedToday;
                todayMinutes.textContent = timerState.totalMinutesToday;
            }

            function switchMode(mode) {
                timerState.mode = mode;
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === mode);
                });
                const duration = mode === 'work' ? timerState.workDuration : timerState.breakDuration;
                timerState.timeLeft = duration * 60;
                updateDisplay();
            }

            function startTimer() {
                if (timerState.isRunning) return;
                timerState.isRunning = true;
                startBtn.textContent = '⏸';
                timerState.interval = setInterval(() => {
                    timerState.timeLeft--;
                    updateDisplay();
                    if (timerState.timeLeft <= 0) {
                        clearInterval(timerState.interval);
                        timerState.isRunning = false;
                        startBtn.textContent = '▶';
                        // Complete
                        if (timerState.mode === 'work') {
                            timerState.completedToday++;
                            timerState.totalMinutesToday += timerState.workDuration;
                            updateStats();
                            saveStats();
                        }
                        // Auto switch
                        const nextMode = timerState.mode === 'work' ? 'break' : 'work';
                        switchMode(nextMode);
                        // Play notification sound
                        try {
                            const ctx = getAudioContext();
                            const osc = ctx.createOscillator();
                            const gain = ctx.createGain();
                            osc.frequency.value = 800;
                            gain.gain.setValueAtTime(0.3, ctx.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1);
                            osc.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start();
                            osc.stop(ctx.currentTime + 1);
                        } catch(e) {}
                    }
                }, 1000);
            }

            function pauseTimer() {
                if (!timerState.isRunning) return;
                clearInterval(timerState.interval);
                timerState.isRunning = false;
                startBtn.textContent = '▶';
            }

            function resetTimer() {
                pauseTimer();
                const duration = timerState.mode === 'work' ? timerState.workDuration : timerState.breakDuration;
                timerState.timeLeft = duration * 60;
                updateDisplay();
            }

            function loadSettings() {
                const saved = localStorage.getItem('pomodoro_settings');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        timerState.workDuration = data.workDuration || 25;
                        timerState.breakDuration = data.breakDuration || 5;
                        timerState.completedToday = data.completedToday || 0;
                        timerState.totalMinutesToday = data.totalMinutesToday || 0;
                        workDurationInput.value = timerState.workDuration;
                        breakDurationInput.value = timerState.breakDuration;
                        updateStats();
                        const duration = timerState.mode === 'work' ? timerState.workDuration : timerState.breakDuration;
                        timerState.timeLeft = duration * 60;
                        updateDisplay();
                    } catch(e) {}
                }
            }

            function saveSettings() {
                const data = {
                    workDuration: timerState.workDuration,
                    breakDuration: timerState.breakDuration,
                    completedToday: timerState.completedToday,
                    totalMinutesToday: timerState.totalMinutesToday
                };
                localStorage.setItem('pomodoro_settings', JSON.stringify(data));
            }

            function saveStats() {
                const data = {
                    completedToday: timerState.completedToday,
                    totalMinutesToday: timerState.totalMinutesToday,
                    date: new Date().toDateString()
                };
                localStorage.setItem('pomodoro_stats', JSON.stringify(data));
            }

            function loadStats() {
                const saved = localStorage.getItem('pomodoro_stats');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        if (data.date === new Date().toDateString()) {
                            timerState.completedToday = data.completedToday || 0;
                            timerState.totalMinutesToday = data.totalMinutesToday || 0;
                        } else {
                            timerState.completedToday = 0;
                            timerState.totalMinutesToday = 0;
                        }
                        updateStats();
                    } catch(e) {}
                }
            }

            // ============ Custom Sounds ============
            let customSounds = [];

            function loadCustomSounds() {
                const saved = localStorage.getItem('pomodoro_custom_sounds');
                if (saved) {
                    try {
                        customSounds = JSON.parse(saved);
                        renderCustomSounds();
                    } catch(e) {}
                }
            }

            function saveCustomSounds() {
                localStorage.setItem('pomodoro_custom_sounds', JSON.stringify(customSounds));
            }

            function renderCustomSounds() {
                const container = document.getElementById('customSounds');
                container.innerHTML = '';
                customSounds.forEach((sound, index) => {
                    const div = document.createElement('div');
                    div.className = 'custom-sound-item';
                    div.innerHTML = `
                        <span>${sound.name}</span>
                        <button data-index="${index}" class="play-custom">▶</button>
                        <button data-index="${index}" class="delete-custom">✕</button>
                    `;
                    container.appendChild(div);
                });
                // Play custom
                container.querySelectorAll('.play-custom').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const idx = parseInt(e.target.dataset.index);
                        const sound = customSounds[idx];
                        if (sound && sound.data) {
                            const binary = atob(sound.data);
                            const arrayBuffer = new ArrayBuffer(binary.length);
                            const view = new Uint8Array(arrayBuffer);
                            for (let i = 0; i < binary.length; i++) {
                                view[i] = binary.charCodeAt(i);
                            }
                            playCustomSound(arrayBuffer);
                            document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('active'));
                        }
                    });
                });
                // Delete custom
                container.querySelectorAll('.delete-custom').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const idx = parseInt(e.target.dataset.index);
                        customSounds.splice(idx, 1);
                        saveCustomSounds();
                        renderCustomSounds();
                    });
                });
            }

            // ============ Event Listeners ============
            // Mode buttons
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (timerState.isRunning) {
                        pauseTimer();
                    }
                    switchMode(btn.dataset.mode);
                });
            });

            // Start/Pause
            startBtn.addEventListener('click', () => {
                if (timerState.isRunning) {
                    pauseTimer();
                } else {
                    startTimer();
                }
            });

            // Reset
            resetBtn.addEventListener('click', resetTimer);

            // Settings toggle
            settingsToggle.addEventListener('click', () => {
                settingsPanel.classList.toggle('hidden');
            });

            // Duration inputs
            workDurationInput.addEventListener('change', () => {
                const val = parseInt(workDurationInput.value) || 25;
                timerState.workDuration = Math.max(1, Math.min(120, val));
                workDurationInput.value = timerState.workDuration;
                if (timerState.mode === 'work' && !timerState.isRunning) {
                    timerState.timeLeft = timerState.workDuration * 60;
                    updateDisplay();
                }
                saveSettings();
            });

            breakDurationInput.addEventListener('change', () => {
                const val = parseInt(breakDurationInput.value) || 5;
                timerState.breakDuration = Math.max(1, Math.min(60, val));
                breakDurationInput.value = timerState.breakDuration;
                if (timerState.mode === 'break' && !timerState.isRunning) {
                    timerState.timeLeft = timerState.breakDuration * 60;
                    updateDisplay();
                }
                saveSettings();
            });

            // Sound buttons
            document.querySelectorAll('.sound-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const sound = btn.dataset.sound;
                    document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('active'));
                    if (currentSound === sound) {
                        stopCurrentSound();
                    } else {
                        btn.classList.add('active');
                        playNoise(sound);
                    }
                });
            });

            // Volume
            volumeSlider.addEventListener('input', () => {
                const val = parseFloat(volumeSlider.value);
                volumeLabel.textContent = Math.round(val * 100) + '%';
                setVolume(val);
            });

            // Upload custom sound
            document.getElementById('uploadArea').addEventListener('click', () => {
                document.getElementById('soundUpload').click();
            });

            document.getElementById('soundUpload').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const arrayBuffer = event.target.result;
                    const uint8Array = new Uint8Array(arrayBuffer);
                    let binary = '';
                    for (let i = 0; i < uint8Array.length; i++) {
                        binary += String.fromCharCode(uint8Array[i]);
                    }
                    const base64 = btoa(binary);
                    customSounds.push({
                        name: file.name,
                        data: base64
                    });
                    saveCustomSounds();
                    renderCustomSounds();
                    // Auto play
                    playCustomSound(arrayBuffer);
                    document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('active'));
                };
                reader.readAsArrayBuffer(file);
                e.target.value = '';
            });

            // ============ Init ============
            loadStats();
            loadSettings();
            loadCustomSounds();
            updateDisplay();
            updateStats();

            // Save settings periodically
            setInterval(() => {
                saveSettings();
            }, 10000);

            // Save on page unload
            window.addEventListener('beforeunload', () => {
                saveSettings();
                saveStats();
            });

            // PWA service worker registration
            if ('serviceWorker' in navigator) {
                // Simple offline support via cache
                // Not registering actual SW to keep it simple
            }

            console.log('Pomodoro Timer initialized');
        })();
    </script>
</body>
</html>
